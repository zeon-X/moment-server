openapi: 3.0.3
info:
  title: Mini Social Feed API
  version: 1.0.0
  description: Backend API documentation for Mini Social Feed App

servers:
  - url: http://localhost:3008
    description: Local Development
  - url: https://your-render-url.onrender.com
    description: Production

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        username:
          type: string
    Comment:
      type: object
      properties:
        id:
          type: string
        author:
          type: string
        username:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
    Post:
      type: object
      properties:
        id:
          type: string
        author:
          type: string
        username:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        likes:
          type: integer
        liked:
          type: boolean
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
        data:
          $ref: "#/components/schemas/User"

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Users
  - name: Posts
  - name: Notifications

paths:
  # Auth Module
  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, username, password]
              properties:
                name:
                  type: string
                age:
                  type: integer
                email:
                  type: string
                username:
                  type: string
                password:
                  type: string
      responses:
        201:
          description: User created successfully
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login using email or username
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier, password]
              properties:
                identifier:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current logged-in user
      security:
        - bearerAuth: []
      responses:
        200:
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /api/v1/auth/fcm-token:
    post:
      tags: [Auth]
      summary: Save FCM token for notifications
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        200:
          description: Token saved successfully
  /api/v1/auth/check-username:
    get:
      tags: [Auth]
      summary: Check if username is available
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
      responses:
        200:
          description: Username check result

  # User Module
  /api/v1/users:
    get:
      tags: [Users]
      summary: Get community members
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of community members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
  /api/v1/users/{username}:
    get:
      tags: [Users]
      summary: Get user profile
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: User profile data
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  age:
                    type: integer
                  email:
                    type: string
                  username:
                    type: string
                  stats:
                    type: object
                    properties:
                      posts:
                        type: integer
                      comments:
                        type: integer
                      likes:
                        type: integer
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Post"

  # Post Module
  /api/v1/posts:
    get:
      tags: [Posts]
      summary: Get global feed
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        200:
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      tags: [Posts]
      summary: Create new post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        201:
          description: Post created successfully
  /api/v1/posts/{id}/like:
    post:
      tags: [Posts]
      summary: Toggle like on post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Like toggled successfully
  /api/v1/posts/{id}/comment:
    post:
      tags: [Posts]
      summary: Add comment to post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        201:
          description: Comment added successfully

  # Notification Module
  /api/v1/notifications:
    get:
      tags: [Notifications]
      summary: Get user notifications
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
  /api/v1/notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark notification as read
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Notification marked as read
  /api/v1/notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Get unread notification count
      security:
        - bearerAuth: []
      responses:
        200:
          description: Unread notification count
